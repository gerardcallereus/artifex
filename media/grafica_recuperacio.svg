<svg xmlns="http://www.w3.org/2000/svg" width="600" height="320" viewBox="0 0 600 320" style="background: #ffffff; font-family: 'Lato', sans-serif;">
  <!-- Region de Perdues (Orange shaded) -->
  <polygon points="60,260 60,193 290,160" fill="rgba(245, 124, 0, 0.08)" />
  <!-- Region de Beneficis (Green shaded) -->
  <polygon points="290,160 520,126 520,60" fill="rgba(56, 142, 60, 0.08)" />

  <!-- Línies de quadrícula de fons -->
  <line x1="60" y1="260" x2="520" y2="260" stroke="#dddddd" stroke-width="1" />
  <line x1="60" y1="210" x2="520" y2="210" stroke="#eeeeee" stroke-width="1" stroke-dasharray="3" />
  <line x1="60" y1="160" x2="520" y2="160" stroke="#eeeeee" stroke-width="1" stroke-dasharray="3" />
  <line x1="60" y1="110" x2="520" y2="110" stroke="#eeeeee" stroke-width="1" stroke-dasharray="3" />
  <line x1="60" y1="60"  x2="520" y2="60"  stroke="#eeeeee" stroke-width="1" stroke-dasharray="3" />
  
  <line x1="152" y1="260" x2="152" y2="20" stroke="#eeeeee" stroke-width="1" stroke-dasharray="3" />
  <line x1="290" y1="260" x2="290" y2="20" stroke="#eeeeee" stroke-width="1" stroke-dasharray="3" />
  <line x1="428" y1="260" x2="428" y2="20" stroke="#eeeeee" stroke-width="1" stroke-dasharray="3" />
  <line x1="520" y1="260" x2="520" y2="20" stroke="#eeeeee" stroke-width="1" stroke-dasharray="3" />

  <!-- Eixos X i Y -->
  <line x1="60" y1="260" x2="520" y2="260" stroke="#333333" stroke-width="2" />
  <line x1="60" y1="20"  x2="60"  y2="260" stroke="#333333" stroke-width="2" />

  <!-- Línia de Costos Totals (Vermella: y = 100 + 1 * Q) -->
  <line x1="60" y1="193" x2="520" y2="126" stroke="#d32f2f" stroke-width="3.5" />

  <!-- Línia d'Ingressos (Verda: y = 3 * Q) -->
  <line x1="60" y1="260" x2="520" y2="60" stroke="#388e3c" stroke-width="3.5" />

  <!-- Punt d'Equilibri (QE = 50 u., € = 150) -->
  <line x1="290" y1="160" x2="290" y2="260" stroke="#666666" stroke-width="1.5" stroke-dasharray="4" />
  <line x1="290" y1="160" x2="60" y2="160" stroke="#666666" stroke-width="1.5" stroke-dasharray="4" />
  <circle cx="290" cy="160" r="6" fill="#7f1146" stroke="#ffffff" stroke-width="2" />

  <!-- Text i Etiquetes del Gràfic -->
  <text x="300" y="156" font-size="11" font-weight="bold" fill="#7f1146">Punt d'Equilibri (50 unitats)</text>
  
  <!-- Textos d'eixos -->
  <text x="290" y="295" font-size="11" font-weight="bold" fill="#333333" text-anchor="middle">Quantitat de clauers venuts (Q)</text>
  <text x="20" y="130" font-size="11" font-weight="bold" fill="#333333" transform="rotate(-90 20 130)" text-anchor="middle">Costos i Ingressos en €</text>

  <!-- Valors eix X -->
  <text x="60" y="275" font-size="10" fill="#666666" text-anchor="middle">0</text>
  <text x="152" y="275" font-size="10" fill="#666666" text-anchor="middle">20</text>
  <text x="290" y="275" font-size="10" fill="#666666" text-anchor="middle">50</text>
  <text x="428" y="275" font-size="10" fill="#666666" text-anchor="middle">80</text>
  <text x="520" y="275" font-size="10" fill="#666666" text-anchor="middle">100</text>

  <!-- Valors eix Y -->
  <text x="50" y="264" font-size="10" fill="#666666" text-anchor="end">0 €</text>
  <text x="50" y="196" font-size="10" fill="#666666" text-anchor="end">100 €</text>
  <text x="50" y="164" font-size="10" fill="#666666" text-anchor="end">150 €</text>
  <text x="50" y="129" font-size="10" fill="#666666" text-anchor="end">200 €</text>
  <text x="50" y="64" font-size="10" fill="#666666" text-anchor="end">300 €</text>

  <!-- Llegenda del gràfic -->
  <rect x="360" y="200" width="140" height="50" rx="4" fill="#fcfcfc" stroke="#cccccc" stroke-width="1" />
  <line x1="370" y1="215" x2="390" y2="215" stroke="#388e3c" stroke-width="3" />
  <text x="396" y="218" font-size="10" fill="#333333">Ingressos totals</text>
  <line x1="370" y1="235" x2="390" y2="235" stroke="#d32f2f" stroke-width="3" />
  <text x="396" y="238" font-size="10" fill="#333333">Costos totals</text>

  <!-- Indicadors d'àrea -->
  <text x="125" y="225" font-size="9" font-weight="bold" fill="#e65100" text-anchor="middle">PÈRDUES</text>
  <text x="380" y="110" font-size="9" font-weight="bold" fill="#2e7d32" text-anchor="middle">BENEFICIS</text>
</svg>
